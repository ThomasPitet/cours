    <body>
        <script>
            const grades = [12, 15, 18, 10, 14, 16];
            let gradesSum = 0;

            for (const grade of grades) {
            gradesSum += grade;
            }

            const average = gradesSum / grades.length;
            console.log(`Moyenne : ${average}/20`);

        </script>
